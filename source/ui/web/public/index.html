<!DOCTYPE html>
<html>
	<head>
		<title>Exocomp</title>

		<!-- favicon -->
		<link rel="icon" type="image/png" href="/design/favicon-96x96.png" sizes="96x96" />
		<link rel="shortcut icon" href="/design/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/design/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Exocomp" />
		<link rel="manifest" href="/design/site.webmanifest" />

		<!-- design -->
		<link rel="stylesheet" href="/design/index.css">
		<link rel="stylesheet" href="/ui/index.css">
		<script type="module" src="/main.mjs" defer></script>
	</head>
	<body>
		<header>
			<div><button data-action="hire-agent" disabled>Hire Agent</button></div>
			<div><label></label></div>
			<div></div>
		</header>
		<aside>
			<nav aria-label="agents"></nav>
		</aside>
		<main></main>
		<div id="call-tool" popover><ul data-name="suggestions"></ul></div>
		<footer class="command">
			<div><label title="Context Window Usage">0.00%</label></div>
			<div><textarea id="prompt"></textarea></div>
		</footer>
		<dialog id="hire-agent">
			<article>
				<h3>Hire Agent</h3>
				<button data-action="close"></button>
				<fieldset>
					<div>
						<label data-type="rebel" for="dialog-select-name">Name</label>
						<input id="dialog-select-name" type="text" data-name="name" placeholder="Coderino"/>
					</div>
					<div>
						<label data-type="experimental" for="dialog-select-role">Role</label>
						<select id="dialog-select-role" title="Agent Role" data-name="role">
							<option value="architect">Architect</option>
							<option value="coder">Coder</option>
							<option value="tester">Tester</option>
						</select>
					</div>
					<div>
						<label data-type="folder" for="dialog-input-sandbox">Sandbox</label>
						<input id="dialog-input-sandbox" type="text" data-name="sandbox" value="" placeholder="./sandbox">
					</div>
					<div>
						<label data-type="text" for="dialog-input-prompt">Prompt</label>
						<textarea id="dialog-input-prompt" data-name="prompt" placeholder="What is your name?"></textarea>
					</div>
					<div data-name="errors"></div>
				</fieldset>
				<footer>
					<div><button data-action="cancel">Cancel</button></div>
					<div></div>
					<div><button data-action="confirm">Confirm</button></div>
				</footer>
			</article>
		</dialog>
	</body>
</html>
