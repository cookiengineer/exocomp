<!DOCTYPE html>
<html>
	<head>
		<title>Exocomp</title>

		<!-- favicon -->
		<link rel="icon" type="image/png" href="/design/favicon-96x96.png" sizes="96x96" />
		<link rel="shortcut icon" href="/design/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/design/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Exocomp" />
		<link rel="manifest" href="/design/site.webmanifest" />

		<!-- design -->
		<link rel="stylesheet" href="/design/index.css">
		<script type="module" src="/index.mjs" defer></script>
	</head>
	<body>
		<header>
			<div>
				<select title="Agent Type" id="agent">
					<option value="manager">Manager</option>
					<option value="coder">Coder</option>
					<option value="tester">Tester</option>
				</select>
				<select title="Model" id="model">
					<option value="qwen3-coder:30b">qwen3-coder:30b</option>
				</select>
			</div>
			<div></div>
			<div>
				<label for="temperature">Temperature:</label>
				<input title="Temperature" id="temperature" type="range" min="0.1" max="1.0" step="0.1" value="0.3"/>
			</div>
		</header>
		<main>
			<article data-role="assistant">
				Hello, my name is Exocomp. I'm here to help, what can I do for you?
			</article>
			<article data-role="tool">
				<details>
					<summary>files.List: 12 files, 10 folders</summary>
					README.md: Type: File, Size: 123 bytes
					Whatever: Folder
				</details>
			</article>
			<article data-role="user">
				Yo this is a message
			</article>
			<ul id="messages"></ul>
		</main>
		<footer>
			<div><label>Send with<br>[Ctrl]+[Enter]</div>
			<div><textarea id="prompt"></textarea></div>
			<div></div>
		</footer>
	</body>
</html>
